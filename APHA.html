<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 參數配置工具 (Web App)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 客製化滾動條樣式 */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111827; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        /* 隱藏下拉選單預設箭頭以符合 UI 風格 */
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4 font-sans">

    <div class="max-w-2xl mx-auto bg-gray-800 rounded-2xl shadow-2xl overflow-hidden border border-gray-700">
        <div class="p-6 border-b border-gray-700 flex justify-between items-center bg-gray-800/50">
            <div>
                <h1 class="text-xl font-bold text-white">硬體參數配置</h1>
                <p class="text-xs text-gray-400 mt-1">傳輸格式：x-www-form-urlencoded</p>
            </div>
            <div class="text-right">
                <span class="px-3 py-1 bg-blue-900/30 text-blue-400 text-[10px] font-bold rounded-full border border-blue-800 uppercase">
                    PWA Ready
                </span>
            </div>
        </div>

        <div class="p-6">
            <div class="mb-6 p-4 bg-gray-900/50 rounded-xl border border-gray-700">
                <label class="block text-[10px] font-black text-gray-500 uppercase mb-2 tracking-widest">ESP32 目標位址 (Target IP)</label>
                <input type="text" id="targetUrl" value="http://192.168.4.1/config" 
                    class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-blue-400 font-mono outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
            </div>

            <div id="paramContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4 h-[450px] overflow-y-auto pr-2 custom-scrollbar">
                </div>

            <div class="mt-8 space-y-4">
                <button onclick="sendData()" id="sendBtn"
                    class="w-full bg-blue-600 hover:bg-blue-500 active:scale-[0.98] disabled:bg-gray-700 text-white font-black py-4 rounded-xl transition-all duration-200 shadow-lg flex justify-center items-center">
                    <span id="btnText">傳送設定到板子</span>
                </button>
                
                <div id="status" class="hidden p-4 rounded-xl text-sm font-mono break-all border transition-all duration-300 animate-pulse">
                    正在準備通訊...
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * 1. 定義需要下拉選單的參數及其對應關係
         */
        const selectOptions = {
            simwifi: { "0": "WiFi", "1": "SIM卡" },
            baudrate: { "0": "9600", "1": "19200", "2": "38400", "3": "115200" },
            parity: { "0": "None", "1": "ODD", "2": "EVEN" },
            stopbit: { "0": "0", "1": "1" },
            uart_mode: { "0": "Slave", "1": "Master" }
        };

        /**
         * 2. 所有初始化參數 (包含圖片中的其餘參數)
         */
        const configData = {
            ssid: "miWIFI",
            password: "25620278dd123",
            master_num: "64",
            url_ser: "api4.tvenka.com",
            url_path: "/IOT/InsertData",
            url_port: "443",
            utc: "+8",
            master_T_D: "0",
            baudrate: "3",    // 預設 115200
            parity: "0",      // 預設 None
            stopbit: "1",     // 預設 1
            uart_st: "1",
            uart_mode: "0",   // 預設 Slave
            master_data: "0",
            master_time: "60",
            simwifi: "0"      // 預設 WiFi
        };

        const container = document.getElementById('paramContainer');

        /**
         * 3. 自動渲染 UI
         */
        Object.keys(configData).forEach(key => {
            const isSelect = selectOptions[key];
            let inputElement = '';

            if (isSelect) {
                // 生成下拉選單
                let optionsMarkup = '';
                for (const [val, label] of Object.entries(selectOptions[key])) {
                    const isSelected = configData[key] === val ? 'selected' : '';
                    optionsMarkup += `<option value="${val}" ${isSelected} class="bg-gray-900 text-white">${label}</option>`;
                }
                inputElement = `
                    <div class="relative">
                        <select id="input_${key}" class="w-full bg-transparent border-b border-gray-600 focus:border-blue-500 outline-none text-blue-400 p-1 cursor-pointer font-bold appearance-none relative z-10">
                            ${optionsMarkup}
                        </select>
                        <div class="absolute right-0 bottom-2 text-gray-600 text-[10px]">▼</div>
                    </div>`;
            } else {
                // 生成一般文字輸入框
                inputElement = `
                    <input type="text" id="input_${key}" value="${configData[key]}" 
                        class="w-full bg-transparent border-b border-gray-600 focus:border-blue-500 outline-none text-white p-1 font-mono">`;
            }

            container.innerHTML += `
                <div class="bg-gray-900/40 p-3 rounded-xl border border-gray-700 hover:border-gray-500 transition-all group">
                    <label class="block text-[10px] text-gray-500 mb-1 font-black uppercase tracking-widest group-hover:text-blue-400 transition-colors">${key}</label>
                    ${inputElement}
                </div>
            `;
        });

        /**
         * 4. 傳送數據函式
         */
        async function sendData() {
            const url = document.getElementById('targetUrl').value;
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('sendBtn');
            const btnText = document.getElementById('btnText');

            // 收集當前 UI 上的數值
            const params = new URLSearchParams();
            Object.keys(configData).forEach(key => {
                const val = document.getElementById(`input_${key}`).value;
                params.append(key, val);
            });

            // UI 反饋更新
            statusDiv.classList.remove('hidden', 'bg-green-900/30', 'bg-red-900/30', 'border-green-800', 'border-red-800', 'text-green-400', 'text-red-400', 'animate-pulse');
            statusDiv.innerHTML = "📡 正在傳送封包至板子...";
            statusDiv.classList.add('block');
            btn.disabled = true;
            btnText.innerHTML = "傳送中...";

            try {
                // 執行 HTTP POST 請求
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params.toString()
                });

                const result = await response.text();
                statusDiv.classList.add('bg-green-900/30', 'border-green-800', 'text-green-400');
                statusDiv.innerHTML = `✅ 傳送成功！<br><span class="text-xs text-gray-300">板子回應：${result || "OK"}</span>`;
            } catch (error) {
                statusDiv.classList.add('bg-red-900/30', 'border-red-800', 'text-red-400');
                statusDiv.innerHTML = `❌ 傳送失敗！<br><span class="text-xs text-gray-300">錯誤：${error.message}</span><br><br><p class="text-[10px] text-gray-400">請檢查：1. 手機是否連上板子 Wi-Fi 2. 目標 IP 是否正確 3. 板子是否開啟 CORS</p>`;
            } finally {
                btn.disabled = false;
                btnText.innerHTML = "傳送設定到板子";
            }
        }
    </script>
</body>
</html>
